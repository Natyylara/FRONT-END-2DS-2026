<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula02 - menu hamburguer</title>

    <style>
        .navbar{
            background-color: black;
        }
        .logo {
            color: white;
        }

        /* Estilo de lista de links*/
        .nav-links{
            list-style: none;
            display: flex; /* Exibe horizontalmente o menu */
            gap: 20px;
            margin: 0;
            padding: 0;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            font-size: 20px;
        }

        .hamburguer 
        {
            display: none; /* Esconde o botão hamburguer por padrão */
            font-size: 24px;
            color: white;
            background: none;
            border: none;
            cursor: pointer;
        }

        @media screen and (max-width: 768px) {
            .hamburguer 
            {
                display: block; /* Exibe o botão hamburguer em telas menores */
            }

            .nav-links 
            {
                display: none;
                flex-direction: column; /* Exibe o menu verticalmente */
                position: absolute;
                top: 60px; /* Ajuste conforme necessário */
                left: 0;
                width: 100%;
                background-color: black;
                text-align: center;
                padding: 20px 0;    
            }

            /* Classe que será adicionada ao javaascript para mostrar o menu */
            .nav-links.active {
                display: flex;
            }
        }

    </style>

</head>
<body>

    <nav class="navbar">
        <div class="logo">Meu site</div>

        <!-- Botão hamburguer para responsividade -->
         <button class="hamburguer" id="hamburguer-btnx">
            &#9776; <!-- Símbolo do ícone de menu -->
         </button>

         <!-- Lista de itens de menu -->
         <ul class="nav-links" id="nav-links">
           <li>
                <a href="https://www.amazon.com.br/">Início</a>
           </li>
           <li>
                <a href="https://www.youtube.com.br/">Sobre</a>
            </li>
            <li>
                <a href="https://www.linkedin.com.br/">Serviços</a>
            </li>
            <li>
                <a href="https://www.github.com/">Contato</a>
            </li>
        </ul>
            
    </nav>

    <div style="padding: 20px;">
        <h1>Conteúdo da página</h1>
        <p>Redimensione a janela do navegador para ver o menu mudar.</p>
    </div>
    <a href="" style="text-decoration: none; color: red;">qualquer coisa</a>

    <script>
        alert("Anjos sem paciência!!!")
    </script>
    
</body>
</html>
